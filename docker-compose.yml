services:
  backend:
    build:
      context: .
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 8000
      NODE_ENV: development
      DATABASE_URL: mysql://root:1234@mysql:3306/hall_db
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .git/
            - drizzle/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: hall_db
    ports:
      - "3307:3306"
    volumes:
      - ../mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
