services:
  backend:
    build:
      context: .
    container_name: hallmgmt-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PUBLIC_PORT:-8000}:${BACKEND_PORT:-8000}"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT:-8000}
      NODE_ENV: production
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-1234}@mysql:3306/${MYSQL_DATABASE:-hall_db}
      PAYMENT_SERVER_URL: ${PAYMENT_SERVER_URL:-http://payment-server:8080}
    networks:
      - hallnet

  mysql:
    image: mysql:8.0
    container_name: hallmgmt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hall_db}
    ports:
      - "${MYSQL_PUBLIC_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-1234}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hallnet

networks:
  hallnet:
    name: hallnet
    driver: bridge

volumes:
  mysql-data:
