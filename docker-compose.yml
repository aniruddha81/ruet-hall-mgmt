services:
  postgres:
    image: postgres:18.4-alpine
    container_name: hallmgmt-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      TZ: Asia/Dhaka
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hallnet

  backend:
    build:
      context: ./backend
    container_name: hallmgmt-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Dhaka
      PORT: ${BACKEND_PORT:-8000}
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID}
      SSLCOMMERZ_STORE_PASSWORD: ${SSLCOMMERZ_STORE_PASSWORD}
      SSLCOMMERZ_IS_SANDBOX: ${SSLCOMMERZ_IS_SANDBOX:-true}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      REDIS_URL: ${REDIS_URL}
      SESSION_TTL: ${SESSION_TTL:-10d}
      STUDENT_URL: ${STUDENT_URL}
      ADMIN_URL: ${ADMIN_URL}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER}
      BREVO_SMTP_PASS: ${BREVO_SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    expose:
      - "${BACKEND_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:${BACKEND_PORT:-8000}/', () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hallnet

  admin:
    build:
      context: ./admin
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    container_name: hallmgmt-admin-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: Asia/Dhaka
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 4001
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    expose:
      - "4001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4001/', () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hallnet

  web:
    build:
      context: ./web
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    container_name: hallmgmt-student-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: Asia/Dhaka
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 3001
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/', () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hallnet

  nginx:
    image: nginx:alpine
    container_name: hallmgmt-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - hallnet

networks:
  hallnet:
    name: hallnet
    driver: bridge

volumes:
  postgres-data:
