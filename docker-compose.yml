services:
  admin:
    build:
      context: .
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
    container_name: hallmgmt-admin-web
    restart: unless-stopped
    ports:
      - "${ADMIN_PUBLIC_PORT:-4001}:4001"
    environment:
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 4001
    networks:
      - hallnet

networks:
  hallnet:
    name: hallnet
    driver: bridge
