services:
  mysql:
    image: mysql:8.0
    container_name: hallmgmt-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
      - /run/mysqld:noexec,nosuid,size=8M
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hallnet

  pay:
    build:
      context: ./pay
    container_name: hallmgmt-pay-server
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    environment:
      PORT: ${PAYMENT_SERVER_PORT:-8080}
      NODE_ENV: production
      MAIN_SERVER_URL: http://backend:${BACKEND_PORT:-8000}
    expose:
      - "${PAYMENT_SERVER_PORT:-8080}"
    networks:
      - hallnet

  backend:
    build:
      context: ./backend
    container_name: hallmgmt-backend
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
      - /app/drizzle:noexec,nosuid,size=32M
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 200
    depends_on:
      mysql:
        condition: service_healthy
      pay:
        condition: service_started
    environment:
      PORT: ${BACKEND_PORT:-8000}
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PAYMENT_SERVER_URL: http://pay:${PAYMENT_SERVER_PORT:-8080}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-10d}
      STUDENT_URL: ${STUDENT_URL}
      ADMIN_URL: ${ADMIN_URL}
    expose:
      - "${BACKEND_PORT:-8000}"
    networks:
      - hallnet

  admin:
    build:
      context: ./admin
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    container_name: hallmgmt-admin-web
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 4001
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    expose:
      - "4001"
    networks:
      - hallnet

  web:
    build:
      context: ./web
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    container_name: hallmgmt-student-web
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 3001
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    expose:
      - "3001"
    networks:
      - hallnet

  nginx:
    image: nginx:alpine
    container_name: hallmgmt-nginx
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16M
      - /var/cache/nginx:noexec,nosuid,size=64M
      - /run:noexec,nosuid,size=8M
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 50
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
      admin:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - hallnet

networks:
  hallnet:
    name: hallnet
    driver: bridge

volumes:
  mysql-data:
