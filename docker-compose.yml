services:
  mysql:
    image: mysql:8.0
    container_name: hallmgmt-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      TZ: Asia/Dhaka
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hallnet

  pay:
    build:
      context: ./pay
    container_name: hallmgmt-pay-server
    restart: unless-stopped
    environment:
      TZ: Asia/Dhaka
      PORT: ${PAYMENT_SERVER_PORT:-8080}
      NODE_ENV: production
      MAIN_SERVER_URL: http://backend:${BACKEND_PORT:-8000}
      PAY_SERVICE_SECRET: ${PAY_SERVICE_SECRET}
    expose:
      - "${PAYMENT_SERVER_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:${PAYMENT_SERVER_PORT:-8080}/', () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hallnet

  backend:
    build:
      context: ./backend
    container_name: hallmgmt-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      pay:
        condition: service_started
    environment:
      TZ: Asia/Dhaka
      PORT: ${BACKEND_PORT:-8000}
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PAYMENT_SERVER_URL: http://pay:${PAYMENT_SERVER_PORT:-8080}
      PAY_SERVICE_SECRET: ${PAY_SERVICE_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-10d}
      STUDENT_URL: ${STUDENT_URL}
      ADMIN_URL: ${ADMIN_URL}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER}
      BREVO_SMTP_PASS: ${BREVO_SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    expose:
      - "${BACKEND_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:${BACKEND_PORT:-8000}/', () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hallnet

  admin:
    build:
      context: ./admin
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    container_name: hallmgmt-admin-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: Asia/Dhaka
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 4001
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    expose:
      - "4001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4001/', () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hallnet

  web:
    build:
      context: ./web
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    container_name: hallmgmt-student-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: Asia/Dhaka
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 3001
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/', () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hallnet

  nginx:
    image: nginx:alpine
    container_name: hallmgmt-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - hallnet

networks:
  hallnet:
    name: hallnet
    driver: bridge

volumes:
  mysql-data:
