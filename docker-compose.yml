services:
  mysql:
    image: mysql:8.0
    container_name: hallmgmt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hallnet

  payment-server:
    build:
      context: ./payment-server
    container_name: hallmgmt-payment-server
    restart: unless-stopped
    environment:
      PORT: ${PAYMENT_SERVER_PORT:-8080}
      NODE_ENV: production
      MAIN_SERVER_URL: http://backend:${BACKEND_PORT:-8000}
    expose:
      - "${PAYMENT_SERVER_PORT:-8080}"
    networks:
      - hallnet

  backend:
    build:
      context: ./ruet-hall-man-backend
    container_name: hallmgmt-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      payment-server:
        condition: service_started
    env_file:
      - ./ruet-hall-man-backend/.env
    environment:
      PORT: ${BACKEND_PORT:-8000}
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PAYMENT_SERVER_URL: http://payment-server:${PAYMENT_SERVER_PORT:-8080}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-10d}
      STUDENT_URL: ${STUDENT_URL}
      ADMIN_URL: ${ADMIN_URL}
    expose:
      - "${BACKEND_PORT:-8000}"
    networks:
      - hallnet

  admin:
    build:
      context: ./ruet-hall-man-admin
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
    container_name: hallmgmt-admin-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 4001
    expose:
      - "4001"
    networks:
      - hallnet

  web:
    build:
      context: ./ruet-hall-man-web
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
    container_name: hallmgmt-student-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 3001
    expose:
      - "3001"
    networks:
      - hallnet

  nginx:
    image: nginx:alpine
    container_name: hallmgmt-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ruet-hall-management.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
      admin:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - hallnet

networks:
  hallnet:
    name: hallnet
    driver: bridge

volumes:
  mysql-data:
