services:
  payment-server:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: development
      MAIN_SERVER_URL: ${MAIN_SERVER_URL:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .git/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: bun.lock
