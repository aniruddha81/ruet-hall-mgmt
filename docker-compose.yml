services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: ruet-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      NODE_ENV: development
      DATABASE_URL: mysql://admin:1234@db:3306/hall-db
      PAYMENT_SERVER_URL: http://payment-server:8080
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: hall-db
      MYSQL_USER: admin
      MYSQL_PASSWORD: 1234
    ports:
      - "3307:3306"
    volumes:
      - ./mysql:/var/lib/mysql
