$kind: http-request
name: Change Password
url: "{{BASE_URL}}/api/profile/change-password"
method: PATCH
headers:
  Authorization: Bearer {{ACCESS_TOKEN}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "OldPass123!",
      "newPassword": "NewPass456!"
    }
order: 4000
