services:
  mysql:
    image: mysql:8.0
    container_name: hallmgmt-mysql-local
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      TZ: Asia/Dhaka
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data-local:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hallnet-local

  pay:
    build:
      context: ./pay
    container_name: hallmgmt-pay-server-local
    restart: unless-stopped
    environment:
      TZ: Asia/Dhaka
      PORT: ${PAYMENT_SERVER_PORT:-8080}
      NODE_ENV: development
      MAIN_SERVER_URL: http://backend-local:${BACKEND_PORT:-8000}
      PAY_SERVICE_SECRET: ${PAY_SERVICE_SECRET}
    ports:
      - "${PAYMENT_SERVER_PORT:-8080}:${PAYMENT_SERVER_PORT:-8080}"
    networks:
      - hallnet-local

  backend:
    build:
      context: ./backend
    container_name: hallmgmt-backend-local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      pay:
        condition: service_started
    environment:
      TZ: Asia/Dhaka
      PORT: ${BACKEND_PORT:-8000}
      NODE_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PAYMENT_SERVER_URL: http://pay-local:${PAYMENT_SERVER_PORT:-8080}
      PAY_SERVICE_SECRET: ${PAY_SERVICE_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-10d}
      STUDENT_URL: ${STUDENT_URL:-http://localhost:3001}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:4001}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    networks:
      - hallnet-local

  admin:
    build:
      context: ./admin
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-local:8000}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    container_name: hallmgmt-admin-web-local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      TZ: Asia/Dhaka
      NODE_ENV: development
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-local:8000}
      PORT: 4001
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    ports:
      - "4001:4001"
    networks:
      - hallnet-local

  web:
    build:
      context: ./web
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-local:8000}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    container_name: hallmgmt-student-web-local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      TZ: Asia/Dhaka
      NODE_ENV: development
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-local:8000}
      PORT: 3001
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    ports:
      - "3001:3001"
    networks:
      - hallnet-local

networks:
  hallnet-local:
    name: hallnet-local
    driver: bridge

volumes:
  mysql-data-local:
