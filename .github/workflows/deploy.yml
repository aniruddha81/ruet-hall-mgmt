name: Deploy to Azure VM

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [deploy]
    paths:
      - web/**
      - admin/**
      - backend/**
      - pay/**
      - nginx.conf
      - nginx.http.conf
      - nginx.ssl.conf
      - docker-compose.yml
      - .github/workflows/deploy.yml
  workflow_dispatch:

concurrency:
  group: azure-vm-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        shell: bash
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          BEFORE="$EVENT_BEFORE"
          AFTER="$EVENT_AFTER"

          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            RANGE="HEAD~1..HEAD"
          else
            RANGE="$BEFORE..$AFTER"
          fi

          CHANGED="$(git diff --name-only $RANGE || true)"

          echo "Changed files in range $RANGE:"
          echo "$CHANGED"

          has_changed() {
            local pattern="$1"
            if echo "$CHANGED" | grep -qE "$pattern"; then
              echo true
            else
              echo false
            fi
          }

          echo "web=$(has_changed '^web/')" >> "$GITHUB_OUTPUT"
          echo "admin=$(has_changed '^admin/')" >> "$GITHUB_OUTPUT"
          echo "backend=$(has_changed '^backend/')" >> "$GITHUB_OUTPUT"
          echo "migrate=$(has_changed '^backend/(drizzle/|src/db/|drizzle\.config\.ts$)')" >> "$GITHUB_OUTPUT"
          echo "pay=$(has_changed '^pay/')" >> "$GITHUB_OUTPUT"
          echo "nginx=$(has_changed '^nginx\.(conf|http\.conf|ssl\.conf)$')" >> "$GITHUB_OUTPUT"
          echo "compose=$(has_changed '^docker-compose\.yml$')" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          CHANGED_WEB: ${{ steps.changes.outputs.web }}
          CHANGED_ADMIN: ${{ steps.changes.outputs.admin }}
          CHANGED_BACKEND: ${{ steps.changes.outputs.backend }}
          CHANGED_PAY: ${{ steps.changes.outputs.pay }}
          CHANGED_MIGRATE: ${{ steps.changes.outputs.migrate }}
          CHANGED_NGINX: ${{ steps.changes.outputs.nginx }}
          CHANGED_COMPOSE: ${{ steps.changes.outputs.compose }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          envs: CHANGED_WEB,CHANGED_ADMIN,CHANGED_BACKEND,CHANGED_PAY,CHANGED_MIGRATE,CHANGED_NGINX,CHANGED_COMPOSE
          script: |
            set -euo pipefail

            # 1) Sync code on VM
            cd ~/ruet-hall-mgmt
            git fetch origin deploy
            git checkout deploy
            git reset --hard origin/deploy

            # 2) Choose nginx mode based on certbot cert availability.
            # Rule: if any certbot live cert pair exists -> SSL mode, otherwise HTTP mode.
            HAS_SSL_CERTS="false"
            for cert_dir in /etc/letsencrypt/live/*; do
              [ -d "$cert_dir" ] || continue
              if [ -L "$cert_dir/fullchain.pem" ] && [ -L "$cert_dir/privkey.pem" ]; then
                HAS_SSL_CERTS="true"
                break
              fi
            done

            if [ "$HAS_SSL_CERTS" = "true" ]; then
              echo "SSL certificate found. Activating nginx.ssl.conf"
              cp nginx.ssl.conf nginx.conf
            else
              echo "SSL certificate not found. Activating nginx.http.conf"
              cp nginx.http.conf nginx.conf
            fi

            # 3) Build only changed services (or everything relevant when compose changes)
            if [ "$CHANGED_WEB" = "true" ] || [ "$CHANGED_COMPOSE" = "true" ]; then
              echo "Building web..."
              docker compose build web
            fi

            if [ "$CHANGED_ADMIN" = "true" ] || [ "$CHANGED_COMPOSE" = "true" ]; then
              echo "Building admin..."
              docker compose build admin
            fi

            if [ "$CHANGED_BACKEND" = "true" ] || [ "$CHANGED_COMPOSE" = "true" ]; then
              echo "Building backend..."
              docker compose build backend
            fi

            if [ "$CHANGED_PAY" = "true" ] || [ "$CHANGED_COMPOSE" = "true" ]; then
              echo "Building pay..."
              docker compose build pay
            fi

            # 4) Bring up services and always recreate nginx to pick up active nginx.conf
            docker compose up -d
            echo "Recreating nginx with active config..."
            docker compose up -d --force-recreate nginx

            # 5) Run backend migrations only when schema-related files changed
            if [ "$CHANGED_MIGRATE" = "true" ]; then
              echo "Ensuring database exists..."
              docker compose exec -T mysql sh -lc \
                'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS ${MYSQL_DATABASE};"'
              echo "Running backend migrations..."
              docker compose exec -T backend npm run db
            fi

            # 6) Cleanup build cache and dangling images
            docker image prune -f
            docker builder prune -f --keep-storage=2g

            # 7) Post-deploy health verification
            declare -A SVC_MAP
            SVC_MAP[backend]="hallmgmt-backend"
            SVC_MAP[admin]="hallmgmt-admin-web"
            SVC_MAP[web]="hallmgmt-student-web"
            SVC_MAP[pay]="hallmgmt-pay-server"

            HEALTHY="false"
            for i in $(seq 1 30); do
              echo "Health check attempt $i/30..."
              HEALTHY="true"

              for svc in backend admin web pay; do
                CONTAINER="${SVC_MAP[$svc]}"
                STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$CONTAINER" 2>/dev/null || echo "missing")
                echo "  $svc ($CONTAINER): $STATUS"
                if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "running" ]; then
                  HEALTHY="false"
                fi
              done

              if [ "$HEALTHY" = "true" ]; then
                break
              fi

              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "⚠️  Some services are not healthy yet. Checking logs..."
              docker compose ps
              docker compose logs --tail=20 admin web backend pay
            fi

            echo "Deployment complete!"

      - name: Notify on failure
        if: failure()
        shell: bash
        run: |
          echo "Deployment FAILED at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
